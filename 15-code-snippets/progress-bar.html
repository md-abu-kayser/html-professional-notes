<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Progress Bars</title>
    <style>
      body {
        font-family: system-ui;
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 5rem;
      }
      .skill {
        width: 300px;
        margin-bottom: 2rem;
      }
      .skill-name {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.3rem;
      }
      .bar-bg {
        background: #334155;
        border-radius: 1rem;
        height: 10px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #38bdf8, #818cf8);
        border-radius: 1rem;
        transition: width 1.5s ease;
      }
    </style>
  </head>
  <body>
    <h2>Skills</h2>
    <div class="skill">
      <div class="skill-name"><span>HTML</span><span>95%</span></div>
      <div class="bar-bg"><div class="bar-fill" data-width="95%"></div></div>
    </div>
    <div class="skill">
      <div class="skill-name"><span>CSS</span><span>90%</span></div>
      <div class="bar-bg"><div class="bar-fill" data-width="90%"></div></div>
    </div>
    <div class="skill">
      <div class="skill-name"><span>JavaScript</span><span>80%</span></div>
      <div class="bar-bg"><div class="bar-fill" data-width="80%"></div></div>
    </div>
    <div class="skill">
      <div class="skill-name"><span>Accessibility</span><span>85%</span></div>
      <div class="bar-bg"><div class="bar-fill" data-width="85%"></div></div>
    </div>
    <script>
      // Animate on load
      window.addEventListener("load", () => {
        document.querySelectorAll(".bar-fill").forEach((bar) => {
          bar.style.width = bar.dataset.width;
        });
      });
    </script>
  </body>
</html>
