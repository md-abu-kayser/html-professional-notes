<form action="/submit" method="post" novalidate>
  <div>
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      aria-describedby="email-hint"
    />
    <small id="email-hint">We'll never share your email.</small>
  </div>
  <button type="submit">Submit</button>
</form>
