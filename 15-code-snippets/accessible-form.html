<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Login Form</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f4f8;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      form {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 380px;
      }
      h2 {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .field {
        margin-bottom: 1.2rem;
      }
      label {
        display: block;
        margin-bottom: 0.3rem;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 0.7em;
        border: 2px solid #cbd5e1;
        border-radius: 0.5rem;
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      }
      button {
        width: 100%;
        padding: 0.8em;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      button:hover {
        background: #1d4ed8;
      }
      .error {
        color: #dc2626;
        font-size: 0.9rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <form aria-labelledby="login-heading" novalidate>
      <h2 id="login-heading">Login</h2>
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          aria-required="true"
          aria-describedby="email-desc"
        />
        <div id="email-desc" class="error">Please enter a valid email.</div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          aria-required="true"
        />
      </div>
      <button type="submit">Sign In</button>
    </form>
  </body>
</html>
