<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Boilerplate</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f4">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center" style="padding: 20px 0">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="background: #ffffff; border-radius: 8px; overflow: hidden"
          >
            <tr>
              <td
                style="background: #1e293b; padding: 20px; text-align: center"
              >
                <h1 style="color: white; margin: 0">ACME Corp</h1>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 30px;
                  font-family: Arial, sans-serif;
                  color: #333333;
                "
              >
                <h2>Hello,</h2>
                <p>
                  This is an HTML email boilerplate. All styles are inline for
                  maximum client compatibility.
                </p>
                <a
                  href="#"
                  style="
                    display: inline-block;
                    padding: 10px 20px;
                    background: #2563eb;
                    color: white;
                    text-decoration: none;
                    border-radius: 4px;
                  "
                  >Call to Action</a
                >
              </td>
            </tr>
            <tr>
              <td
                style="
                  background: #f8fafc;
                  padding: 15px;
                  text-align: center;
                  font-size: 12px;
                  color: #777;
                "
              >
                &copy; 2026 ACME Corp. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
