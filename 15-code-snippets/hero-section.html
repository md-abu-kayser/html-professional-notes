<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Section</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
      }
      .hero {
        background: linear-gradient(135deg, #1e3a8a, #3b82f6);
        color: white;
        padding: 5rem 2rem;
        text-align: center;
        min-height: 60vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .hero h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      .hero p {
        font-size: 1.2rem;
        max-width: 500px;
        margin-bottom: 2rem;
        opacity: 0.9;
      }
      .cta {
        background: white;
        color: #1e3a8a;
        padding: 0.8em 2em;
        border-radius: 2em;
        text-decoration: none;
        font-weight: bold;
        transition: transform 0.2s;
      }
      .cta:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Build Something Great</h1>
      <p>
        Modern, clean hero section that captures attention and drives action.
      </p>
      <a href="#" class="cta" role="button">Get Started</a>
    </section>
  </body>
</html>
