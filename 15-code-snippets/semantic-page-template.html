<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic HTML5 Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }
      header,
      nav,
      main,
      aside,
      footer {
        padding: 1.5rem;
        margin: 0.5rem;
        border-radius: 0.5rem;
      }
      header {
        background: #2563eb;
        color: white;
        text-align: center;
      }
      nav {
        background: #1e293b;
      }
      nav a {
        color: white;
        margin: 0 0.5rem;
        text-decoration: none;
      }
      .layout {
        display: flex;
        flex-wrap: wrap;
      }
      main {
        flex: 2;
        min-width: 300px;
        background: #f1f5f9;
      }
      aside {
        flex: 1;
        min-width: 200px;
        background: #e2e8f0;
      }
      footer {
        background: #1e293b;
        color: white;
        text-align: center;
      }
      @media (max-width: 600px) {
        .layout {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>My Website</h1>
      <p>Using semantic HTML5 elements</p>
    </header>
    <nav aria-label="Main navigation">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
    <div class="layout">
      <main>
        <h2>Main Content Area</h2>
        <p>
          This is where the primary content goes. Using
          <code>&lt;main&gt;</code> improves accessibility and SEO.
        </p>
      </main>
      <aside>
        <h3>Sidebar</h3>
        <p>Related links or advertisements.</p>
      </aside>
    </div>
    <footer>
      <p>&copy; 2026 Semantic Co. All rights reserved.</p>
    </footer>
  </body>
</html>
