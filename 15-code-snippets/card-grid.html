<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0f172a;
        padding: 2rem;
        color: #e2e8f0;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 2rem;
        max-width: 1000px;
        margin: 0 auto;
      }
      .card {
        background: #1e293b;
        border-radius: 1rem;
        overflow: hidden;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        cursor: pointer;
      }
      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
      }
      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        background: #334155;
      }
      .card-body {
        padding: 1.2rem;
      }
      .card-body h3 {
        margin-bottom: 0.5rem;
      }
      .card-body p {
        font-size: 0.9rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>✨ Card Grid Layout</h1>
    <div class="card-grid">
      <div class="card">
        <img src="https://picsum.photos/400/200?random=1" alt="Random" />
        <div class="card-body">
          <h3>Explore Nature</h3>
          <p>Discover breathtaking landscapes and outdoor adventures.</p>
        </div>
      </div>
      <div class="card">
        <img src="https://picsum.photos/400/200?random=2" alt="Random" />
        <div class="card-body">
          <h3>Urban Life</h3>
          <p>Vibrant cityscapes and modern architecture.</p>
        </div>
      </div>
      <div class="card">
        <img src="https://picsum.photos/400/200?random=3" alt="Random" />
        <div class="card-body">
          <h3>Tech & Innovation</h3>
          <p>Cutting‑edge technology shaping the future.</p>
        </div>
      </div>
      <div class="card">
        <img src="https://picsum.photos/400/200?random=4" alt="Random" />
        <div class="card-body">
          <h3>Food Culture</h3>
          <p>A taste of world cuisines and culinary secrets.</p>
        </div>
      </div>
    </div>
  </body>
</html>
